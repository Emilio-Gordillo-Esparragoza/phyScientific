[server]
headless = true
enableCORS = false
enableXsrfProtection = true

[browser]
gatherUsageStats = false

[theme]
base = "light"
primaryColor = "#5F6B45"
backgroundColor = "#E6E2D6"
# Match page paper so Streamlit widget chrome does not paint a beige slab over sliders.
secondaryBackgroundColor = "#E6E2D6"
textColor = "#1A1814"
font = "serif"
