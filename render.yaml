services:
  - type: web
    name: lecturelab
    runtime: python
    plan: free
    region: oregon
    branch: main
    buildCommand: pip install -r requirements-app.txt
    startCommand: streamlit run app/streamlit_app.py --server.port $PORT --server.address 0.0.0.0 --browser.gatherUsageStats false
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.10"
